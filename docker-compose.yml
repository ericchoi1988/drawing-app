services:
  drawpad:
    build: .
    container_name: drawpad
    ports:
      - "5000:5000"
    volumes:
      # Persist the SQLite database outside the container
      - drawpad-data:/data
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=/data/data.db
    restart: unless-stopped

volumes:
  drawpad-data:
